<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <link rel="stylesheet" href="css/pricing-plans-layout-page-fcc.css">
</head>
<body>
    <header><h1>Pricing Plans</h1></header>

    
        <main class="pricing-container">
            <div class="pricing-card basic-plan">
                <h2>Basic</h2>
                <p>$9/month</p>
                <button class="button" id="basic-button">Mor details</button>
            </div>
            <div class="pricing-card pro-plan">
                <h2>Pro</h2>
                <p>$19/month</p>
                <button class="button" id="pro-button">Mor details</button>
            </div>
            <div class="pricing-card premium-plan">
                <h2>Premium</h2>
                <p>$29/month</p>
                <button class="button" id="premium-button">Mor details</button>
            </div>
        </main>
    
</body>
</html>
