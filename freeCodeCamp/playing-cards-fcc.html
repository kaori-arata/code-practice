<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADA Compliant Playing Cards</title>
  <link rel="stylesheet" href="css/playing-cards-fcc.css">
</head>
<body>


  <main id="playing-cards">

    <div class="card" aria-label="Ace of Spades">

      <div class="left" aria-hidden="true">A &spades;</div>
      <div class="middle" aria-hidden="true">
        <span>&spades;</span>
      </div>
      <div class="right" aria-hidden="true">A &spades;</div>
    </div>


    <div class="card card-red" aria-label="Queen of Hearts">
      <div class="left" aria-hidden="true">Q &hearts;</div>
      <div class="middle" aria-hidden="true">
        <span>&hearts;</span>
      </div>
      <div class="right" aria-hidden="true">Q &hearts;</div>
    </div>


    <div class="card card-red" aria-label="King of Diamonds">
      <div class="left" aria-hidden="true">K &diams;</div>
      <div class="middle" aria-hidden="true">
        <span>&diams;</span>
      </div>
      <div class="right" aria-hidden="true">K &diams;</div>
    </div>

  </main>

</body>
</html>
