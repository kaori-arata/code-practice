<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="css/contact-form-fcc.css">
</head>
<body>
    <div class="form-container">
        <form>
            <h2>Contact me!</h2>
            
            <label for="name">Full Name: </label>
            <input type="text" id="name" name="name" required placeholder="e.g. Jane Doe">

            <label for="email">Email: </label>
            <input type="email" id="email" name="email" required placeholder="example@email.com">

            <label for="message">Leave a Message: </label>
            <textarea name="message" id="message" required placeholder="Feel free to ask a quiestion"></textarea>

            <button type="submit">Submit</button>
       
        </form>
    </div>
</body>
</html>
