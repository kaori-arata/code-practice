<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャーハンの作り方</title>
</head>
<body>
    <!--タイトル-->
    <h1>簡単パラパラ炒飯の作り方</h1>

    <!--説明文-->
    <p>フライパン一つで５分でできる、失敗しない炒飯のレシピです。
        <strong>強火で一気に炒めること</strong>がポイントです。</p>

    <!--炒飯の画像-->
    <img src="xxx.xxx" alt="美味しい炒飯の写真">

    <section>
        <!--材料-->
        <h2>材料（1人分）</h2>

        <ul>
            <li>ご飯：1杯</li>
            <li>卵：1個</li>
            <li>刻みネギ：適量</li>
        </ul>
    </section>

    <section>
        <!--作り方-->
        <h2>作り方</h2>

        <ol>
            <li>フライパンに油をひき、よく温めます。</li>
            <li>溶き卵を入れ、すぐにご飯を投入します。</li>
            <li>具材を加え、全体を強火で手早く炒め合わせます。</li>
        </ol>

    </section>


</body>
</html>
